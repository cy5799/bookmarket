<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的公网IP</title>
<style>
  :root{
    --bg-1:#0f2027;
    --bg-2:#203a43;
    --bg-3:#2c5364;
    --card-bg:rgba(255,255,255,.08);
    --card-border:rgba(255,255,255,.16);
    --accent:#22d3ee;
    --accent-dim:rgba(34,211,238,.18);
    --text:#f1f5f9;
    --text-dim:rgba(241,245,249,.58);
    --btn-h:40px;
  }
  *{box-sizing:border-box}
  body{
    display:flex;justify-content:center;align-items:center;
    min-height:100vh;margin:0;
    background:linear-gradient(135deg,var(--bg-1),var(--bg-2),var(--bg-3));
    font-family:"Segoe UI",-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--text);
  }

  .card{
    width:min(380px,88vw);
    background:var(--card-bg);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border:1px solid var(--card-border);
    border-radius:24px;
    padding:34px 30px 28px;
    box-shadow:0 20px 70px rgba(0,0,0,.42);
    text-align:center;
  }
  .card .icon{
    width:54px;height:54px;margin:0 auto 16px;
    display:flex;align-items:center;justify-content:center;
    border-radius:16px;
    background:var(--accent-dim);
    border:1px solid rgba(34,211,238,.35);
    color:var(--accent);
  }
  .card .icon svg{width:28px;height:28px}

  .card .title{
    font-size:.82em;letter-spacing:.2em;text-transform:uppercase;
    color:var(--text-dim);margin-bottom:12px;
  }
  .card .ip{
    font-size:2.2em;font-weight:700;letter-spacing:.02em;
    word-break:break-all;line-height:1.25;min-height:1.25em;user-select:text;
  }
  .card .meta{
    margin-top:10px;
    display:flex;align-items:center;justify-content:center;gap:6px;
    font-size:.95em;color:var(--text-dim);min-height:1.3em;
  }
  .card .meta .pin{width:15px;height:15px;flex:none;opacity:.85}
  .card .meta span{user-select:text}

  .actions{
    margin-top:24px;
    display:flex;align-items:center;justify-content:center;gap:12px;
  }
  .actions button{
    height:var(--btn-h);border:1px solid transparent;border-radius:10px;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    color:var(--text);font-size:.95em;font-family:inherit;cursor:pointer;
    transition:background .2s ease,transform .15s ease,border-color .2s ease;
    user-select:none;
  }
  .actions button:active{transform:translateY(1px)}
  .actions .copy{
    padding:0 18px;
    background:var(--accent-dim);
    border-color:rgba(34,211,238,.45);
  }
  .actions .copy:hover{background:rgba(34,211,238,.30)}
  .actions .copy svg{width:16px;height:16px}
  .actions .refresh{
    width:var(--btn-h);padding:0;
    background:rgba(255,255,255,.10);
    border-color:rgba(255,255,255,.22);
  }
  .actions .refresh:hover{background:rgba(255,255,255,.20)}
  .actions .refresh svg{width:18px;height:18px}
  .actions .refresh.spin svg{animation:spin .55s linear}

  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  .toast{
    position:fixed;left:50%;bottom:46px;transform:translateX(-50%) translateY(18px);
    background:rgba(15,23,42,.94);color:#fff;
    padding:12px 22px;border-radius:12px;font-size:.92em;
    border:1px solid rgba(34,211,238,.45);
    box-shadow:0 10px 30px rgba(0,0,0,.45);
    opacity:0;pointer-events:none;
    transition:opacity .3s ease,transform .3s ease;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="2" y1="12" x2="22" y2="12"></line>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
      </svg>
    </div>
    <div class="title">当前公网 IP</div>
    <div class="ip" id="ip">加载中…</div>
    <div class="meta" id="meta">
      <svg class="pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
        <circle cx="12" cy="10" r="3"></circle>
      </svg>
      <span id="metaText"></span>
    </div>

    <div class="actions">
      <button class="copy" id="copy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        <span>点击复制</span>
      </button>
      <button class="refresh" id="refresh" title="刷新 IP">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
      </button>
    </div>
  </div>

  <div class="toast" id="toast">✅ 已复制到剪贴板</div>

<script>
  let ip='';
  const ipEl=document.getElementById('ip');
  const metaText=document.getElementById('metaText');
  const copyBtn=document.getElementById('copy');
  const refreshBtn=document.getElementById('refresh');
  const toastEl=document.getElementById('toast');

  function loadIp(){
    ipEl.textContent='加载中…';
    metaText.textContent='';
    fetch('https://myip.ipip.net').then(r=>r.text()).then(t=>{
      ip=(t.match(/\d+\.\d+\.\d+\.\d+/)||['获取失败'])[0];
      ipEl.textContent=ip;
      const m=t.match(/来自于[:：]\s*([^\n]+)/);
      metaText.textContent=m?m[1].trim():'';
    }).catch(()=>{
      ip='获取失败';
      ipEl.textContent=ip;
      metaText.textContent='';
    });
  }
  loadIp();

  let toastTimer=null;
  function showToast(msg){
    toastEl.textContent=msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>toastEl.classList.remove('show'),1800);
  }

  copyBtn.onclick=function(){
    if(ip&&ip!=='获取失败'){
      navigator.clipboard.writeText(ip).then(()=>showToast('✅ 已复制到剪贴板'));
    }else{
      showToast('⚠️ 暂无可复制的 IP');
    }
  };

  refreshBtn.onclick=function(){
    refreshBtn.classList.add('spin');
    refreshBtn.disabled=true;
    loadIp();
    showToast('🔄 正在刷新…');
    setTimeout(()=>{
      refreshBtn.classList.remove('spin');
      refreshBtn.disabled=false;
    },550);
  };
</script>
</body>
</html>
